<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Email Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
      min-height: 100vh;
    }

    .header {
      max-width: 640px;
      width: 100%;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #f8fafc;
    }

    .header p {
      font-size: 14px;
      color: #64748b;
      margin-top: 8px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 14px;
      padding: 24px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    label:first-child {
      margin-top: 0;
    }

    input[type=text] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type=text]:focus {
      border-color: #6366f1;
    }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #5254cc; }
    button:active { transform: scale(0.97); }

    button.full {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      margin-top: 20px;
    }

    button.secondary {
      background: transparent;
      border: 1px solid #2d3348;
      color: #94a3b8;
      font-size: 12px;
      padding: 6px 12px;
    }

    button.secondary:hover {
      background: transparent;
      border-color: #6366f1;
      color: #e2e8f0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 10px;
      display: block;
    }

    .variant-body {
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .copied {
      color: #10b981 !important;
      transition: color 0.2s;
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Cold Email Generator</h1>
    <p>Enter your prospect details — get 3 battle-tested email variants in seconds.</p>
  </div>

  <div class="card" style="max-width:640px; width:100%; margin-bottom:20px;">
    <label for="inp-name">Prospect Name</label>
    <input type="text" id="inp-name" placeholder="e.g. Sarah">

    <label for="inp-company">Company</label>
    <input type="text" id="inp-company" placeholder="e.g. Acme Corp">

    <label for="inp-pain">Pain Point</label>
    <input type="text" id="inp-pain" placeholder="e.g. high SDR ramp time slowing revenue">

    <label for="inp-value">Your Value Prop</label>
    <input type="text" id="inp-value" placeholder="e.g. AI onboarding that cuts ramp time by 40%">

    <button class="full" onclick="generate()">Generate Emails</button>
    <button class="secondary" onclick="resetForm()" style="margin-top:10px; width:100%;">Reset</button>
  </div>

  <!-- Results — hidden until generate() is called -->
  <div id="results" style="display:none; max-width:640px; width:100%;">

    <div class="variant-card card" id="card-direct" style="margin-bottom:16px;">
      <span class="card-label variant-label">Direct</span>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:14px;" onclick="copyBody(this)">Copy</button>
    </div>

    <div class="variant-card card" id="card-curious" style="margin-bottom:16px;">
      <span class="card-label variant-label">Curious</span>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:14px;" onclick="copyBody(this)">Copy</button>
    </div>

    <div class="variant-card card" id="card-story" style="margin-bottom:16px;">
      <span class="card-label variant-label">Story-Led</span>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:14px;" onclick="copyBody(this)">Copy</button>
    </div>

  </div>

  <script>
    // --- Template functions (each ~50 words, XSS-safe via textContent) ---

    // Direct: statement of fact + hard CTA
    function directTemplate(name, company, pain, value) {
      return `Hi ${name},

I noticed ${company} is likely dealing with ${pain}. Most sales teams I speak with lose hours every week to this — and it compounds fast.

${value}. We typically help teams fix it in under 30 days.

Worth a quick 15-minute call this week?`;
    }

    // Curious: opens with a direct question, withholds resolution, soft close
    function curiousTemplate(name, company, pain, value) {
      return `Hi ${name},

Quick question — is ${company} actively trying to solve ${pain} right now, or is it still on the backburner?

I ask because we've helped teams in similar situations using ${value}. The results surprised them.

Happy to share what worked — would that be useful?`;
    }

    // Story-Led: micro-narrative opener with social proof framing
    function storyTemplate(name, company, pain, value) {
      return `Hi ${name},

A revenue leader at a company like ${company} came to us six months ago — their team was stuck on ${pain} and it was killing their quarter.

They started using ${value} and turned it around in 90 days.

I'd love to share the playbook — worth 15 minutes?`;
    }

    // --- Helpers ---

    function renderVariant(cardId, body) {
      const card = document.getElementById(cardId);
      card.querySelector('.variant-body').textContent = body;
      card.querySelector('.copy-btn').dataset.body = body;
    }

    function showCopied(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }

    // --- Public API ---

    function generate() {
      const name    = document.getElementById('inp-name').value.trim()    || 'there';
      const company = document.getElementById('inp-company').value.trim() || 'your company';
      const pain    = document.getElementById('inp-pain').value.trim()    || 'your key challenge';
      const value   = document.getElementById('inp-value').value.trim()   || 'our solution';

      renderVariant('card-direct',  directTemplate(name, company, pain, value));
      renderVariant('card-curious', curiousTemplate(name, company, pain, value));
      renderVariant('card-story',   storyTemplate(name, company, pain, value));

      const results = document.getElementById('results');
      results.style.display = 'block';
      results.classList.remove('fade-in');
      void results.offsetWidth; // force reflow to re-trigger animation
      results.classList.add('fade-in');
      results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyBody(btn) {
      const text = btn.dataset.body;
      if (!text) return;
      navigator.clipboard.writeText(text)
        .then(() => showCopied(btn))
        .catch(() => {
          // Fallback for file:// protocol
          const ta = Object.assign(document.createElement('textarea'), { value: text });
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showCopied(btn);
        });
    }

    function resetForm() {
      ['inp-name', 'inp-company', 'inp-pain', 'inp-value'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('results').style.display = 'none';
      document.getElementById('inp-name').focus();
    }

    // Submit on Enter from any input field
    document.querySelectorAll('input[type=text]').forEach(input => {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
    });
  </script>
</body>
</html>
