<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Email Generator</title>
  <meta name="description" content="Generate 3 battle-tested cold email angles instantly. Fill in your prospect details and get ready-to-send emails — Direct, Curious, and Story-Led.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 120px;
      min-height: 100vh;
    }

    .header {
      max-width: 560px;
      width: 100%;
      margin-bottom: 56px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #0a0a0a;
    }

    .header p {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
    }

    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
      margin-top: 36px;
    }

    label:first-child { margin-top: 0; }

    input[type=text],
    input[type=password] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #e0e0e0;
      border-radius: 0;
      padding: 10px 0;
      color: #0a0a0a;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type=text]:focus,
    input[type=password]:focus { border-bottom-color: #0a0a0a; }
    input[type=text].error { border-bottom-color: #cc0000; }

    #ai-error {
      font-size: 12px;
      color: #cc0000;
      margin-top: 8px;
      display: none;
    }

    .ai-badge {
      font-size: 11px;
      color: #16a34a;
      font-weight: 500;
      margin-left: 8px;
    }

    button {
      background: #0a0a0a;
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 15px 28px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.65; }
    button:active { opacity: 0.45; }

    button.full {
      width: 100%;
      padding: 17px;
      margin-top: 48px;
    }

    button.secondary {
      background: transparent;
      border: 1px solid #ddd;
      color: #aaa;
      font-size: 11px;
      padding: 8px 16px;
    }

    button.secondary:hover {
      border-color: #0a0a0a;
      color: #0a0a0a;
      opacity: 1;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
      display: block;
    }

    .subject-line {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .subject-line strong {
      color: #0a0a0a;
      font-weight: 500;
    }

    .variant-body {
      color: #333;
      font-size: 15px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .copied {
      color: #16a34a !important;
      border-color: #16a34a !important;
      transition: color 0.2s, border-color 0.2s;
    }

    /* ── Floating background objects ── */
    .float-obj {
      position: fixed;
      pointer-events: none;
      opacity: 0.55;
      z-index: 0;
    }
    .float-obj svg { display: block; }

    @keyframes drift1 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(12px,-18px) rotate(8deg); }
      50%  { transform: translate(-8px,-30px) rotate(-4deg); }
      75%  { transform: translate(-16px,-12px) rotate(6deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(-20px,14px) rotate(-10deg); }
      66%  { transform: translate(10px,22px) rotate(5deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0,0) rotate(15deg); }
      40%  { transform: translate(18px,-10px) rotate(-5deg); }
      70%  { transform: translate(-6px,16px) rotate(20deg); }
      100% { transform: translate(0,0) rotate(15deg); }
    }
    @keyframes drift4 {
      0%   { transform: translate(0,0) rotate(-8deg); }
      50%  { transform: translate(-14px,-20px) rotate(10deg); }
      100% { transform: translate(0,0) rotate(-8deg); }
    }
    @keyframes drift5 {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(10px,14px) scale(1.08); }
      100% { transform: translate(0,0) scale(1); }
    }

    .f1 { top:8vh;  left:5vw;  animation: drift1 18s ease-in-out infinite; }
    .f2 { top:20vh; right:6vw; animation: drift2 22s ease-in-out infinite; }
    .f3 { top:55vh; left:3vw;  animation: drift3 25s ease-in-out infinite; }
    .f4 { top:70vh; right:4vw; animation: drift4 19s ease-in-out infinite; }
    .f5 { top:40vh; left:8vw;  animation: drift5 28s ease-in-out infinite; }
    .f6 { top:85vh; right:9vw; animation: drift1 21s ease-in-out infinite reverse; }

    /* ── Input focus glow ── */
    input[type=text]:focus,
    input[type=password]:focus {
      border-bottom-color: #0a0a0a;
    }

    /* ── Button shimmer sweep ── */
    button.full {
      position: relative;
      overflow: hidden;
    }
    button.full::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: none;
    }
    button.full:hover::after {
      left: 160%;
      transition: left 0.5s ease;
    }
    button.full:disabled::after { display: none; }

    /* ── Loading pulse on generate button ── */
    button.full:disabled {
      opacity: 0.6;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 0.4; }
    }

    /* ── Result card hover lift ── */
    .variant-card {
      transition: transform 0.2s ease;
    }
    .variant-card:hover {
      transform: translateY(-2px);
    }

    /* ── Staggered card entrance ── */
    .fade-in .variant-card:nth-child(1) { animation: cardIn 0.4s ease 0.05s both; }
    .fade-in .variant-card:nth-child(2) { animation: cardIn 0.4s ease 0.15s both; }
    .fade-in .variant-card:nth-child(3) { animation: cardIn 0.4s ease 0.25s both; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Content sits above floating objects ── */
    .header, .card, #results { position: relative; z-index: 1; }

    /* ── Score pill row ── */
    .score-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
    }

    .score-pill.green  { background: #dcfce7; color: #15803d; }
    .score-pill.orange { background: #fff7ed; color: #c2410c; }
    .score-pill.red    { background: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>

<!-- Floating background objects (Gufram-style scattered canvas) -->

<!-- Orange envelope -->
<div class="float-obj f1">
  <svg width="80" height="60" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="78" height="58" rx="5" fill="#FF6B35" stroke="#FF6B35" stroke-width="1.5"/>

  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- Yellow document / email draft -->
<div class="float-obj f4">
  <svg width="56" height="68" viewBox="0 0 56 68" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="54" height="66" rx="4" fill="#FBBF24"/>
    <line x1="12" y1="22" x2="44" y2="22" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="32" x2="44" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="42" x2="36" y2="42" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

<!-- Hot pink target -->
<div class="float-obj f5">
  <svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="27" cy="27" r="26" stroke="#EC4899" stroke-width="2.5"/>
    <circle cx="27" cy="27" r="16" stroke="#EC4899" stroke-width="2.5"/>
    <circle cx="27" cy="27" r="6" fill="#EC4899"/>
  </svg>
</div>

<!-- Purple lightning bolt -->
<div class="float-obj f6">
  <svg width="44" height="64" viewBox="0 0 44 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M26 2 L4 36 L18 36 L18 62 L40 28 L26 28 Z" fill="#8B5CF6" stroke="#8B5CF6" stroke-width="1" stroke-linejoin="round"/>

<main>
  <div class="header">
    <h1>Cold Email Generator</h1>
    <p>Fill in the details — get 3 battle-tested email angles, ready to send.</p>
  </div>

  <div class="card" style="max-width:560px; width:100%; margin-bottom:20px;">
    <label for="inp-name">Prospect First Name</label>
    <input type="text" id="inp-name" placeholder="e.g. Sarah">

    <label for="inp-company">Their Company</label>
    <input type="text" id="inp-company" placeholder="e.g. Acme Corp">

    <label for="inp-pain">Their Pain Point</label>
    <input type="text" id="inp-pain" placeholder="e.g. slow SDR ramp time eating into quota">

    <label for="inp-value">Your Value Prop</label>
    <input type="text" id="inp-value" placeholder="e.g. AI onboarding that cuts ramp time by 40%">

    <details id="ai-settings" style="margin-top:20px;">
      <summary style="cursor:pointer; font-size:11px; color:#aaa; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; list-style:none; display:flex; align-items:center; gap:6px;">
        <span>&#9654;</span> AI Mode <span style="font-weight:400; color:#64748b;">(optional)</span>
      </summary>
      <div style="margin-top:12px;">
        <label for="inp-api-key" style="margin-top:0;">Anthropic API Key</label>
        <input type="password" id="inp-api-key" placeholder="sk-ant-...">
        <p style="font-size:11px; color:#64748b; margin-top:6px; line-height:1.5;">
          Stored in localStorage only. Sent exclusively to api.anthropic.com. Visible in browser DevTools.
        </p>
      </div>
    </details>
    <p id="ai-error"></p>

    <button class="full" id="btn-generate">Generate Emails</button>
    <button class="secondary" id="btn-reset" style="margin-top:10px; width:100%;">Reset</button>
  </div>

  <div id="results" style="display:none; max-width:560px; width:100%;">

    <div class="variant-card" id="card-direct" style="border-top:1px solid #e8e8e8; padding:32px 0; margin-bottom:0;">
      <span class="card-label">Direct</span>
      <p class="subject-line">Subject: <strong class="subject-text"></strong></p>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:20px;">Copy</button>
    </div>

    <div class="variant-card" id="card-curious" style="border-top:1px solid #e8e8e8; padding:32px 0; margin-bottom:0;">
      <span class="card-label">Curious</span>
      <p class="subject-line">Subject: <strong class="subject-text"></strong></p>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:20px;">Copy</button>
    </div>

    <div class="variant-card" id="card-story" style="border-top:1px solid #e8e8e8; border-bottom:1px solid #e8e8e8; padding:32px 0; margin-bottom:0;">
      <span class="card-label">Story-Led</span>
      <p class="subject-line">Subject: <strong class="subject-text"></strong></p>
      <p class="variant-body"></p>
      <button class="secondary copy-btn" style="margin-top:20px;">Copy</button>
    </div>

  </div>

</main>
  <script>
    (() => {
      // localStorage key for Anthropic API key
      const API_KEY_STORAGE = 'anthropic_api_key';

      // Single source of truth for input field IDs
      const FIELDS = [
        { id: 'inp-name',    label: 'Prospect Name'  },
        { id: 'inp-company', label: 'Company'        },
        { id: 'inp-pain',    label: 'Pain Point'     },
        { id: 'inp-value',   label: 'Value Prop'     },
      ];

      // --- Templates ---
      // Each returns { subject, body }. Rendered via textContent — XSS-safe.

      function directTemplate(name, company, pain, value) {
        return {
          subject: `${name} — quick thought on ${company}`,
          body: `Hi ${name},

${company} isn't the only team I've spoken with that's dealing with ${pain} — it tends to compound faster than people expect.

${value}. Most teams see results within 30 days without disrupting what's already working.

Worth a quick 15-minute call this week to see if it's a fit?`,
        };
      }

      function curiousTemplate(name, company, pain, value) {
        return {
          subject: `Is ${company} actively working on this?`,
          body: `Hi ${name},

Quick question — is ${company} actively trying to solve ${pain} right now, or is it still on the backburner?

I ask because we've helped teams in your position using ${value}, and the lift was consistently bigger than they expected going in.

Happy to share exactly what moved the needle — would that be a useful 15 minutes?`,
        };
      }

      function storyTemplate(name, company, pain, value) {
        return {
          subject: `How a team like ${company} fixed this in 90 days`,
          body: `Hi ${name},

Six months ago a sales leader at a company like ${company} came to us with the same problem — ${pain} was derailing their quarter and nothing was sticking.

They implemented ${value} and turned it around in 90 days. Q3 came in above target.

I'd love to share the exact playbook — worth 15 minutes?`,
        };
      }

      // --- Scoring ---

      function scoreEmail(body) {
        const lower = body.toLowerCase();
        const [name, company, pain, value] = getFieldValues().map(v => v.toLowerCase());

        // Personalisation: +2 name, +2 company, +2 pain — cap 10
        let personalisation = 0;
        if (name    && lower.includes(name))    personalisation += 2;
        if (company && lower.includes(company)) personalisation += 2;
        if (pain    && lower.includes(pain.split(' ').slice(0, 3).join(' '))) personalisation += 2;
        personalisation = Math.min(10, personalisation + 4); // base of 4 so minimum effort shows

        // Value: +3 value prop, +3 number/%, +2 benefit word — cap 10
        let valueScore = 0;
        if (value && lower.includes(value.split(' ')[0])) valueScore += 3;
        if (/\d+\s*%|\d+x|\d{2,}/.test(lower)) valueScore += 3;
        if (/\b(save|cut|reduce|improve)\b/.test(lower)) valueScore += 2;
        valueScore = Math.min(10, valueScore);

        // CTA: +4 "15 minutes"/"call", +3 question mark, +2 "worth" — cap 10
        let cta = 0;
        if (/15.?min|15 minute|\bcall\b/.test(lower)) cta += 4;
        if (body.includes('?')) cta += 3;
        if (/\bworth\b/.test(lower)) cta += 2;
        cta = Math.min(10, cta);

        // Length scoring
        const wordCount = body.trim().split(/\s+/).length;
        let length;
        if      (wordCount < 80)  length = 10;
        else if (wordCount < 100) length = 7;
        else if (wordCount < 130) length = 4;
        else                      length = 1;

        return { personalisation, value: valueScore, cta, length };
      }

      function renderScore(cardId, scores) {
        const card = document.getElementById(cardId);

        // Remove any existing score row (re-render safe)
        const existing = card.querySelector('.score-row');
        if (existing) existing.remove();

        const metrics = [
          { label: 'Personalisation', val: scores.personalisation },
          { label: 'Value',           val: scores.value           },
          { label: 'CTA',             val: scores.cta             },
          { label: 'Length',          val: scores.length          },
        ];

        const row = document.createElement('div');
        row.className = 'score-row';

        metrics.forEach(({ label, val }) => {
          const pill = document.createElement('span');
          pill.className = 'score-pill ' + (val >= 8 ? 'green' : val >= 5 ? 'orange' : 'red');
          pill.textContent = `${label} ${val}/10`;
          row.appendChild(pill);
        });

        // Insert before the Copy button
        const copyBtn = card.querySelector('.copy-btn');
        card.insertBefore(row, copyBtn);
      }

      // --- Helpers ---

      function getFieldValues() {
        return FIELDS.map(({ id }) => document.getElementById(id).value.trim());
      }

      function validate() {
        let valid = true;
        FIELDS.forEach(({ id }) => {
          const el = document.getElementById(id);
          if (!el.value.trim()) { el.classList.add('error'); valid = false; }
        });
        return valid;
      }

      function clearErrors() {
        FIELDS.forEach(({ id }) => document.getElementById(id).classList.remove('error'));
      }

      function renderVariant(cardId, { subject, body }) {
        const card = document.getElementById(cardId);
        card.querySelector('.subject-text').textContent = subject;
        card.querySelector('.variant-body').textContent = body;
        card.querySelector('.copy-btn').dataset.body = `Subject: ${subject}\n\n${body}`;
        renderScore(cardId, scoreEmail(body));
      }

      function showCopied(btn) {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      }

      function copyToClipboard(text) {
        if (navigator.clipboard) return navigator.clipboard.writeText(text);
        // Fallback for file:// protocol
        const ta = Object.assign(document.createElement('textarea'), { value: text });
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return Promise.resolve();
      }

      // --- Actions ---

      function generateWithTemplates(name, company, pain, value) {
        renderVariant('card-direct',  directTemplate(name, company, pain, value));
        renderVariant('card-curious', curiousTemplate(name, company, pain, value));
        renderVariant('card-story',   storyTemplate(name, company, pain, value));
      }

      async function generateWithAI(name, company, pain, value, apiKey) {
        const btn = document.getElementById('btn-generate');
        const errEl = document.getElementById('ai-error');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Generating with AI...';

        try {
          const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 600,
              system: 'You are a cold email copywriter for B2B SaaS sales. Write concise, human-sounding cold emails under 100 words each. Never use buzzwords or empty phrases. Each email must feel genuinely different in tone and structure.',
              messages: [{
                role: 'user',
                content: `Generate 3 cold email variants for this prospect:\n- Prospect first name: ${name}\n- Their company: ${company}\n- Their pain point: ${pain}\n- My value proposition: ${value}\n\nReturn ONLY valid JSON in this exact format, no other text:\n{"direct":{"subject":"...","body":"..."},"curious":{"subject":"...","body":"..."},"story":{"subject":"...","body":"..."}}\n\nRules:\n- Each body must be under 100 words\n- Direct: confident opener, state the problem, offer solution, ask for 15 mins\n- Curious: open with a genuine question, reference the pain, offer insight, soft CTA\n- Story-Led: lead with a customer story, tie to their situation, invite them to learn more\n- Do not use filler phrases like "I hope this finds you well"\n- Address the prospect by first name in the opening line`,
              }],
            }),
          });

          if (resp.status === 401) {
            errEl.textContent = 'Invalid API key. Check your key or remove it to use template mode.';
            errEl.style.display = 'block';
            generateWithTemplates(name, company, pain, value);
            return;
          }
          if (resp.status === 429) {
            errEl.textContent = 'Rate limit reached. Try again in a moment.';
            errEl.style.display = 'block';
            generateWithTemplates(name, company, pain, value);
            return;
          }
          if (!resp.ok) {
            errEl.textContent = `API error (${resp.status}). Using template mode instead.`;
            errEl.style.display = 'block';
            generateWithTemplates(name, company, pain, value);
            return;
          }

          const data = await resp.json();
          const raw = data.content[0].text.trim();
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch (_) {
            errEl.textContent = 'AI output was unexpected — used templates instead.';
            errEl.style.display = 'block';
            generateWithTemplates(name, company, pain, value);
            return;
          }

          renderVariant('card-direct',  parsed.direct);
          renderVariant('card-curious', parsed.curious);
          renderVariant('card-story',   parsed.story);

          // Show AI badge on first card label
          const firstLabel = document.querySelector('#card-direct .card-label');
          if (firstLabel && !firstLabel.querySelector('.ai-badge')) {
            const badge = document.createElement('span');
            badge.className = 'ai-badge';
            badge.textContent = '· AI';
            firstLabel.appendChild(badge);
          }

        } catch (err) {
          errEl.textContent = 'Could not reach Anthropic API. Check your connection.';
          errEl.style.display = 'block';
          generateWithTemplates(name, company, pain, value);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Generate Emails';
        }
      }

      async function generate() {
        if (!validate()) return;
        clearErrors();

        const [name, company, pain, value] = getFieldValues();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);

        if (apiKey) {
          await generateWithAI(name, company, pain, value, apiKey);
        } else {
          generateWithTemplates(name, company, pain, value);
        }

        const results = document.getElementById('results');
        results.style.display = 'block';
        results.classList.remove('fade-in');
        void results.offsetWidth; // force reflow to re-trigger animation
        results.classList.add('fade-in');
        results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function resetForm() {
        FIELDS.forEach(({ id }) => { document.getElementById(id).value = ''; });
        clearErrors();
        document.getElementById('results').style.display = 'none';
        document.getElementById(FIELDS[0].id).focus();
      }

      // --- Event wiring ---

      document.getElementById('btn-generate').addEventListener('click', generate);
      document.getElementById('btn-reset').addEventListener('click', resetForm);

      // API key persistence
      const apiKeyInput = document.getElementById('inp-api-key');
      const savedKey = localStorage.getItem(API_KEY_STORAGE) || '';
      if (savedKey) apiKeyInput.value = savedKey;
      apiKeyInput.addEventListener('input', () => {
        const v = apiKeyInput.value.trim();
        if (v) localStorage.setItem(API_KEY_STORAGE, v);
        else localStorage.removeItem(API_KEY_STORAGE);
      });

      document.querySelectorAll('input[type=text]').forEach(input => {
        input.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
        input.addEventListener('input',   () => input.classList.remove('error'));
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => copyToClipboard(btn.dataset.body || '').then(() => showCopied(btn)));
      });
    })();
  </script>
</body>
</html>
